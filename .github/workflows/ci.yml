name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bookhou_test
          POSTGRES_PASSWORD: bookhou_test_pass
          POSTGRES_DB: bookhou_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://bookhou_test:bookhou_test_pass@localhost:5432/bookhou_test?schema=public
      JWT_SECRET: test-jwt-secret-for-ci
      JWT_EXPIRES_IN: 7d
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run Prisma migrations
        run: npx prisma migrate deploy

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: |
          npx jest --no-cache --forceExit \
            src/common/helpers/invoice-number.helper.spec.ts \
            src/common/helpers/timezone.helper.spec.ts \
            src/modules/auth/auth.service.spec.ts \
            src/modules/parties/parties.service.spec.ts \
            src/modules/payments/payments.service.spec.ts \
            src/modules/coupons/coupons.service.spec.ts \
            src/modules/waivers/waivers.service.spec.ts

      - name: Run E2E tests
        run: npm run test:e2e -- --forceExit
        env:
          FRONTEND_URL: http://localhost:3001

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build check
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t bookhou-backend .

      - name: Verify Docker image
        run: docker run --rm bookhou-backend node -e "console.log('Docker image OK')"
